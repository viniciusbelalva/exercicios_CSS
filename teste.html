<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Satisfação</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  background:#f5f5f5;
}

.container{
  max-width:900px;
  margin:60px auto;
  background:#fff;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}

h1{
  margin-bottom:20px;
}

.subtitle{
  color:#777;
  margin-bottom:30px;
}

.rating{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:30px;
}

.rating input{
  display:none;
}

.rating label{
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:#eee;
  cursor:pointer;
  transition:0.3s;
}

.rating input:checked + label{
  background:#6b3e26;
  color:#fff;
}

.rating label:hover{
  background:#d6bfae;
}

textarea{
  width:100%;
  height:120px;
  border-radius:10px;
  border:1px solid #ccc;
  padding:15px;
  resize:none;
  margin-bottom:20px;
}

button{
  background:#6b3e26;
  color:#fff;
  border:none;
  padding:12px 30px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#8a5335;
}

</style>
</head>

<body>

<div class="container">
  <h1>Painel de Satisfação</h1>
  <p class="subtitle">Como foi sua experiência?</p>

  <div class="rating">
    <input type="radio" id="n0" name="nota"><label for="n0">0</label>
    <input type="radio" id="n1" name="nota"><label for="n1">1</label>
    <input type="radio" id="n2" name="nota"><label for="n2">2</label>
    <input type="radio" id="n3" name="nota"><label for="n3">3</label>
    <input type="radio" id="n4" name="nota"><label for="n4">4</label>
    <input type="radio" id="n5" name="nota"><label for="n5">5</label>
    <input type="radio" id="n6" name="nota"><label for="n6">6</label>
    <input type="radio" id="n7" name="nota"><label for="n7">7</label>
    <input type="radio" id="n8" name="nota"><label for="n8">8</label>
    <input type="radio" id="n9" name="nota"><label for="n9">9</label>
    <input type="radio" id="n10" name="nota"><label for="n10">10</label>
  </div>

  <textarea placeholder="Deixe seu comentário..."></textarea>

  <button>Enviar avaliação</button>
</div>

</body>
</html>
