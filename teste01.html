<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float e Clear</title>
    <style>
        .conteudo {
            text-align: center;
            margin: 2px, solid black;
            background-color: rgb(202, 200, 200);
            padding: 10px;
            margin: 5px;
            width: 150px;
            height: 150px;
            float: left;
        }

        .clear {
            clear: both;
        }

        .principal {
            margin: solid black 3px;
            background-color: rgb(9, 0, 32);
            text-align: center;
        }

        .p {
            margin: 15px;
            padding: 5px;
            color: white;
        }


        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Playfair+Display:wght@400..900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(222, 222, 222);
        }

        /* TÍTULO */

        .titulo {
            text-align: center;
            font-family: "Playfair Display", serif;
            font-size: 30px;
            padding: 15px;
            color: rgb(110, 52, 1);
        }

        /* CONTAINER */

        .container-localizacao {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 35px;

            margin-top: 20px;
        }

        /* BOTÕES DA ESQUERDA */

        .botoes-lado {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }



        .btn-lateral {

            width: 190px;
            height: 110px;

            background-color: white;

            border: none;
            border-radius: 18px;

            font-family: "Oswald", sans-serif;
            font-size: 24px;
            color: rgb(110, 52, 1);

            cursor: pointer;

            box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.20);

            transition: 0.3s;
        }

        .btn-lateral:hover {

            background-color: rgb(110, 52, 1);
            color: white;

            transform: translateX(8px);
        }

        /* QUADRO */

        .quadro {

            font-family: "Oswald", sans-serif;

            background-color: white;

            width: 875px;
            height: 415px;

            border-radius: 15px;

            padding: 30px;

            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.25);
        }

        /* TEXTO */

        .p_quadro {
            font-size: 19px;
        }

        /* MAPA */

        .float_map {
            float: right;
        }

        /* CONTEÚDO */

        .float {
            float: left;
            width: 45%;
        }

        /* BOTÃO WHATSAPP */

        .botao-imagem {

            display: flex;
            align-items: center;
            gap: 10px;

            padding: 12px 20px;

            background-color: #02920e;
            color: white;

            border: none;
            border-radius: 30px;

            font-family: "Oswald", sans-serif;
            font-size: 18px;

            cursor: pointer;

            transition: 0.3s;
        }

        .botao-imagem:hover {

            background-color: #01780b;

            transform: scale(1.05);
        }

        .botao-imagem img {

            width: 25px;
            height: 25px;
        }
    </style>
</head>

<body>
    <div class="container-localizacao">

        <!-- BOTÕES LATERAIS -->

        <div class="botoes-lado">

            <button class="btn-lateral">
                📍 Localização
            </button>

            <button class="btn-lateral">
                📞 Contato
            </button>

            <button class="btn-lateral">
                🕒 Horários
            </button>

        </div>

        <!-- QUADRO -->

        <div class="quadro">

            <div class="float_map">

                <iframe src="https://www.google.com/maps/embed?pb=!1m18..." width="450" height="375" style="border:0;"
                    allowfullscreen="" loading="lazy">
                </iframe>

            </div>

            <div class="float">

                <span class="p_quadro">
                    📍 Henrique Pontara, 379 - Jardim Santa Fé Ourinhos - SP
                </span>

                <br><br>

                <hr>

                <br>

                <strong>Funcionamento:</strong><br>

                Segunda - Terça - Quarta - Quinta - Sexta<br>

                <strong>12h - 22h</strong>

                <br><br>

                Sábado - Domingo<br>

                <strong>14h - 00h</strong>

                <br><br>

                <hr>

                <br>

                <strong>Telefone:</strong><br>

                (+55) 14 99604 - 9756

                <br><br>

                <button class="botao-imagem">

                    <img src="img/whats_logo_01.png" alt="">

                    Fale com a gente

                </button>

            </div>

        </div>

    </div>
</body>

</html>
